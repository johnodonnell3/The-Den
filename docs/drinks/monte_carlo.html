<body>

<h1 class="drink-title">Monte Carlo</h1>

<img class="drink-photo" src="../images/montecarlo.jpg" alt="montecarlo">

<h2>Ingredients</h2>
<ul class="ingredients">
    <li>2 oz rye whiskey</li>
    <li>1/2 oz Bénédictine</li>
    <li>2 dashes Angostura bitters</li>
</ul>

<h2>Instructions</h2>
<ol class="instructions">
    <li>Add all ingredients to a mixing glass with ice.</li>
    <li>Stir until well chilled.</li>
    <li>Strain into a rocks glass over fresh ice.</li>
    <li>Garnish with an lemon peel.</li>
</ol>
